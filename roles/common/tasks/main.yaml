- name: Set the hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}" 

- name: Install the necessary packages 
  ansible.builtin.dnf:
    name: "{{ packages }}" 
    state: present

- name: Create dev user
  ansible.builtin.user:
    name: "{{ item.name }}"
    state: present
    comment: "VisibleOne Developer"
    create_home: true
    shell: /bin/bash
  loop: "{{ dev_users }}"

- name: Ensure .ssh directory exists with correct permissions
  ansible.builtin.file:
    path: "/home/{{ dev_users }}/.ssh"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: '0700'
  loop: "{{ dev_users }}"

- name: Set authorized key for the new user
  ansible.posix.authorized_key:
    user: "{{ item.name }}"
    state: present
#    key: "{{ item.ssh_key }}"
    key: "{{ lookup('file', item.ssh_key_file )}}"
  loop: "{{ dev_users }}"
