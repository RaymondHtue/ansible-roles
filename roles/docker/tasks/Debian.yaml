- name: Ensure old versions of Docker are not installed.
  package:
    name: "{{ docker_unofficial_packages }}"
    state: absent

- name: Install prerequisite packages for Docker
  ansible.builtin.apt:
    name: "{{ docker_prerequisite_packages }}"
    state: present
    update_cache: yes

- name: Ensure the keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker's official GPG key
  ansible.builtin.get_url:
    url: "{{ docker_ubuntu_gpg_key }}"
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Add Docker's official APT repository
  ansible.builtin.apt_repository:
    # Maps standard Ansible architectures (like x86_64) to Debian's package architectures (like amd64)
    repo: "deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' if ansible_architecture == 'aarch64' else ansible_architecture }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
    update_cache: yes

- name: Install Docker Engine, CLI, Containerd, and Plugins
  ansible.builtin.apt:
    name: "{{ docker_install_packages }}"
    state: latest

- name: Ensure /etc/docker directory exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: '0755'

- name: Apply Docker daemon.json configuration (Log Rotation)
  ansible.builtin.copy:
    content: "{{ docker_daemon_config | to_nice_json }}"
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
  notify: restart docker

- name: Enable & start docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes

- name: Verify Docker installation
  command: docker --version
  register: docker_version
  changed_when: false

- name: Display Docker version
  debug:
    msg: "Docker installed successfully: {{ docker_version.stdout }}"

