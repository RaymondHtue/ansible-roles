- name: Test nginx config
  block:
  - name: validate nginx config
    ansible.builtin.command: nginx -t
    register: validate_nginx_config 

  - name: Display Nginx configuration status 
    debug:
      msg: "Nginx -t command message: {{ validate_nginx_config.stderr_lines }}"
    when: validate_nginx_config.rc == 0 

  - name: Restart Nginx if configuration is valid
    ansible.builtin.systemd:
      name: nginx 
      state: restarted
    when: validate_nginx_config.rc == 0 
  rescue:
  - name: Display Nginx configuration errors
    debug:
      msg: "Nginx -t command errors: {{ validate_nginx_config.stderr }}"
    when: validate_nginx_config.rc != 0 
