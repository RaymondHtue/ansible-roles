- name: Create nginx virtual host for php 
  ansible.builtin.template:
    src: vhosts-php-RedHat.conf.j2
    dest: "/etc/nginx/conf.d/{{ item.server_name }}.conf"
  loop: "{{ vhosts }}"
  when: item.app == "php"

- name: Create nginx virtual host for frontend
  ansible.builtin.template:
    src: vhosts-frontend.conf.j2
    dest: "/etc/nginx/conf.d/{{ item.server_name }}.conf"
  loop: "{{ vhosts }}"
  when: item.app == "frontend"

