- name: Set special permission for web user read and write access stoarge 
  ansible.posix.acl:
    path: "/var/www/vhosts"
    entity: "{{ web_user_redhat }}" 
    etype: user
    permissions: rwx
    default: true
    recursive: true
    state: present
  changed_when: false

- name: Set special permission for developer read and write access stoarge 
  ansible.posix.acl:
    path: "/var/www/vhosts"
    entity: "{{ web_developer }}" 
    etype: user
    permissions: rwx
    default: true
    recursive: true
    state: present
  changed_when: false
