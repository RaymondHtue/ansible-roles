---
- name: Check that the file composer file exists
  ansible.builtin.stat:
    path: /usr/bin/composer
  register: stat_result

- name: Download the Composer installer script
  ansible.builtin.get_url:
    url: https://getcomposer.org/download/latest-2.2.x/composer.phar
    dest: /tmp/composer
    mode: '0755'
    checksum: "sha256:https://getcomposer.org/download/latest-2.2.x/composer.phar.sha256sum"
  when: not stat_result.stat.exists
  tags:
    - download

- name: Move the executable to the user's bin directory
  ansible.builtin.copy:
    src: "/tmp/composer"
    dest: "/usr/bin/composer"
    mode: '0755'
    remote_src: yes
  when: not stat_result.stat.exists


